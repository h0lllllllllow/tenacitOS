name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'

jobs:
  npm-audit-report:
    name: npm-audit-report
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm audit --audit-level=high
